front:
  text: 修丹妙用至理論珠六夫修生者本以為身身濟則神存神存則成真如此必有至藥服餌遂至靈通且古之賢哲多能曉達此術是後世慕學之徒至於罄産竭資窮年終老而未聞有能達到者何也蓋不惟自昧所見以失來訓抑又恃於寡聞故無由得盡於至埋或咽津導氣以為修持或遺形定慧乃名真一甚者又取五金八石滓質之物妄加煆錬冀有成功是皆庸下淺生豈𧷤玄元妙㫖然雖此道說有多途而超凡之因不離還丹一法余忝生際遇獲永師傳安敢獨善其身聊著九篇曰火候訣略為一卷以接來者學道君子無輕示人致招罪愆纍及九玄七祖慎之慎之
  hash: sha256:c6d3cd1ee8f7b04ada2c28456c574a105a222580214bd819cf94eb7f5cd4ffee

body:
  text: 卦氣一道生於一一為藥之祖故始於十一月冬至一陽而生復二陽而生臨三陽而生泰四陽而生大壯五陽而生夬六陽而生乾五月夏至一隂而生媾二隂而生遁三隂而生否四隂而生觀五隂而生剝六隂而生坤起於一陽盡其升降周十二卦氣畢功其藥在鼎如子在胞上水下火以順隂陽得木味而酸得金味而辛得火味而苦得水味而鹹終四季歸中宫得土味而甜火候二每自冬至陽氣起於湧泉復卦用事終於乾六卦為陽候也夏至陽極隂生媾卦用事終於坤六卦為隂候也周十二月盡二十四氣運用而合天符三百六十度晝夜皆依漏刻中奪取正氣神鼎中合錬汞鉛此即運火之機要也凡一年三百六十日合四千三百二十時每日旦暮各係一卦成七百二十卦計多數奪得四千三百二十年正氣在金鼎中聖人蹙之一月中有三百六十時係卦三百六十爻應三百六十日一年之候又奪得一年內四千三百二十年正氣在一月之中又蹙此六十卦氣候於丑日六十時內為一小周計三百六十爻應一年之候又奪得一月內一年三百六十爻四千三百二十年正氣在於五日之中復以兩日半周合三十時應三十日係卦三百六十爻應一年之候又奪得五日內一年四千三百二十年正氣在兩日半中又從此分三十卦一百八十爻應半月十五日用事復將此十五曰配於十二位中自子至已六辰係卦一百八十爻應冬至後到夏至前一百八十日為半年自午至亥六辰亦係卦一百八十爻應夏至巳後到冬至前一百八十日為半年凡一月三百六十時應一年合四千三百二十時象四千三百二十年內除卯酉二位為沐浴之月一年內合數除七百二十時實得十箇月運用火候只計三千六百時象三千六百年合又符三百六十度之數也其沐浴傳在口訣自古不載文字得者深宜袐之祕之藥訣三真鉛八兩真汞八兩右二味正一斤每兩有二十四銖計三百八十有四應易卦之爻數以合一年有三百六十日并二十四氣均其火候內除六十日是卯酉金丹沐浴之月所得三百日三千六百時奪三千六百年之氣為真丹成就之積數丹竈之功見於此矣火候有斤兩初一月半斤二月一斤三月一斤半四月二斤五月二斤半六月二斤七月一斤半八月一斤九月半斤十月四兩每十日一加以至於減如候藥成寒定後開慮失精氣蓋火生於寅王在午墓在戌且以一千八十時計之奪得天地大數三周其藥巳變紅色光輝奪日乃謂之小還丹內包五色外形一體其要在用八卦以應其月推卦氣以盡其候人以十月成胎丹以十月脫胎人道相通隂陽造化自然符㑹黃帝經曰日月有數小大有定聖功生焉神明出焉此之謂也正疑四或謂玉壷頌以黃芽十月熟又海蟾先生有八月秋石望月開之言何也蓋十月者火候之數八月者氣運之方大凡錬養之道不出隂陽之理若隂陽差錯卦氣殊謬豈得成功也然前賢言此實有所謂不可殢文求之故龍虎論云三年功積百日為期又云須存卯酉運火坎離此亦隱意相為表裹非通師說未易言之或曰丹成可以目擊而見之乎曰昔隂君長生有言老時紫嫩時青熟時紅若不可見安得云此曰如是乃外丹歟曰豈獨外也且五金八石然皆外也以滓質為之並為死類亦無長生之理況大要在內真外應者為還丹之功也仍取隂陽氣候不可差失太玄真人曰人之和氣冬至起於湧泉湧泉者足心下也十一月至膝十二月至股正月至腰謂之三陽成二月至膊三月至項四月至頂為純陽用事夏至起於湧泉五月至膝六月至股七月至腰謂之三隂成八月至膊九月至項十月至頂為純隂用事此乃天地隂陽蓋不離人身也東平先生曰學道人消息取捉取四蛇并二鼠大哉言乎盡此矣其賊性命之機也君子得知則奪取五行之氣隂陽之精還源返本而復歸於真一小人得之則輕易而反以自賊也能知此者可不慎歟老子曰吾言甚易知甚易行又下莫能知莫能行誠謂此也甲庚五每月初八暮月見於庚月屬水金所生故曰上弦鉛半斤也至二十三日且見於甲逼日所出水來尅火火去消金故曰下弦汞半斤也二氣交結姤為夫婦坎離既濟上下相依㑹合中宫包五行氣生而出土謂之黃芽亦如人之有生皆因受氣成質自然之道不可以智知所錬大丹體亦如此元皇上經曰始青之下月與日兩半同升合為一出彼玉池入金室大如彈丸黃如橘中有佳味甜如蜜子能得之慎勿失審能修之天相畢此之謂也五行六天一生水而潤下為玄武位應北方卦主坎藏主腎色主黑其味鹹於物為鉛蓋因乾元正氣而生號曰中男外象太隂而內陽者玉兔也隂極陽生故鉛中出金謂之陽真砂是也地二生火而炎上為朱雀位應南方卦主離藏主心色主赤其味苦於物為砂蓋得坤元正氣而生號曰中女外象太陽而內隂者金烏也陽極隂生故砂中出汞謂之隂真汞是也天三生木而曲直為青龍位應東方卦主震藏主肝色主青其味酸於物為汞蓋坤初受乾之氣而生號曰長男火花也為天魂萬物以之生謂之木精是也地四生金而從革為白虎位應西方卦主兊藏主肺色主白其味辛於物為金蓋乾三偶坤之氣而生號曰少女水花也為地魄萬物由之以成謂之大丹頭是也天五生土而稼穡為勾陳萬物之母位應中宫藏主脾色主黃其味甘於物為四黃蓋鉛汞乘此而含養受五氣足而生黃芽乃丹砂之城郭謂之金鼎是也凡修大藥非鼎不載亦要四象備水火交鉛汞親龍虎應卦氣合不失隂陽錬成真丹經曰孤隂不生孤陽不成一隂一陽其道乃昌此之謂真五行也然五行知有相生而不知有相制則不能為用惟真人為能見其為用之機而賊取之以成就其服食之丹遂逃出隂陽之外而獨立純陽之表返與造化齊功經曰芽為金以金伐木砂為火以火銷金鉛為水以水滅火水既盛以土鎮之感乎其類制乎其氣此之謂相反制也蓋所見去俗遠矣藥證七鉛汞為丹非世間鉛汞四黃為匱非世之四黃此三者皆生於天地之先受隂陽氣結成因其配合而産黃芽蓋為三五一是也青霞子曰芽若是鉛棄鉛萬里芽若非鉛從鉛而始鉛為芽母芽為鉛子既得金花捨鉛不使此言極是泄機乃凡人不可解也雖然得鉛巳真而汞或不親是謂孤陽孤陽不可為丹謂其龍虎之氣走失而火候不時故也是以魏公亦嘗言錬銀於鉛神功自然灰也鉛沈銀浮謂之黃芽其性微熱其味甘巳是長生之寶然孤陽之芽未可獨立須合以汞為雌雄黃芽蓋謂此也或者曰鉛汞既非世間物將何以為實曰天地之精日月之根隂陽之髓水火之源龍虎交合剛柔互用始於一三而終五實謂萬物之母故天真皇人稱天有玄一生於太陽名為流珠泉妙之門訣而留之可得長生人有三人其居不同兼能守之可為仙王是真汞也安得無其實而名之為藥乎或者又曰鉛汞既真何以有生曰劉公袐㫖云欲得長生當修所生涓子亦云夫求道修長生如接樹焉將巳有命資未來之命此是生生相續之理故號大藥人得服之豈不超世設有智士雖或得門而不知火候合天符而未為精達儻謂不然則丹經不云五行匹配八卦相連而太乙真人亦不云金丹雖鉛汞之神功道在五行之妙用也是知後學多迷不至者蓋在火候無功五行為踈然則包真君云八月錬頭冬至取逍遙子云七日燒成白馬牙青霞子云十箇月成丹又云三月藥成紅紫色既有火候何異端如此曰三年功十月胎是謂之要而諸家之說略見其用耳求其所致則不異也具用八壇三層取淨好土無砂石黑雜為上仭列四面應四時又應四月純乾用事每層髙尺二寸應年有十二月日有十二時置爐髙滿盡應八卦加鼎於上鼎髙三尺應天地人有三足應三生萬物之象上列九宫應九星其鼎有十病亦宜細看其壇下廣三丈六應三十六旬中廣二丈四應二十四氣上廣丈六應二八一斤之數先必齊潔焚香排鏡劒掛繒綵列金銀信幣乃與弟子升壇按卦氣看火候以成就大藥蓋示不為慢易也如此九轉九九轉者謂其藥在神鼎中運用火候每百日三轉應三年之大數奪得天符正氣一千二百年之功三三合九當其九轉是奪得三千六百年之功應九年之大數而大丹始成故內經謂一片火輪九年丹竈者是也真人張果曰白汞生朱砂黑鉛化黃芽三三合九數變化有三般又有以九轉之後復制為一十八轉為三年之功畢法曰一年為小還二年為中還三年為大還又曰藥一年巳下雖堪服食終受氣不足蓋其說亦要在三化為功也黃庭經云通利天道存玄根百二十年猶可還過此守道誠甚難唯待九轉八瓊丹則運火應卦以修大丹不可不審知此也修丹妙用至理論終
